<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loading">
    <div class="spinner-container">
      <div class="glowing-spinner"></div>
      <div class="glowing-spinner-inner"></div>
    </div>
    <p class="loading-text">Loading Warehouse App</p>
    <p class="loading-subtext">Fetching resources, please wait...</p>
  </div>

  <style>
    /* Premium loading screen aesthetics */
    body {
      background-color: #0c0f17;
      margin: 0;
      padding: 0;
    }
    #loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at center, #151a26 0%, #0c0f17 100%);
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: opacity 0.5s ease-out;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 99999;
    }
    .spinner-container {
      position: relative;
      width: 70px;
      height: 70px;
      margin-bottom: 24px;
    }
    .glowing-spinner {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top-color: #007aff;
      border-bottom-color: #007aff;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.4);
    }
    .glowing-spinner-inner {
      position: absolute;
      top: 10px;
      left: 10px;
      width: calc(100% - 20px);
      height: calc(100% - 20px);
      border: 2px solid transparent;
      border-left-color: #5856d6;
      border-right-color: #5856d6;
      border-radius: 50%;
      animation: spin-reverse 0.9s linear infinite;
      opacity: 0.8;
    }
    .loading-text {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin: 0 0 8px 0;
      animation: pulse 1.8s ease-in-out infinite;
    }
    .loading-subtext {
      font-size: 13px;
      color: #8e8e93;
      margin: 0;
      font-weight: 400;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spin-reverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>

  <script>
    // Remove the loading screen from the DOM as soon as Flutter renders the app
    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        if (mutation.addedNodes) {
          for (const node of mutation.addedNodes) {
            if (node.tagName === 'FLT-GLASS-PANE') {
              const loadingEl = document.getElementById('loading');
              if (loadingEl) {
                // Fade out smoothly and then remove
                loadingEl.style.opacity = '0';
                setTimeout(() => loadingEl.remove(), 500);
              }
              observer.disconnect();
              return;
            }
          }
        }
      }
    });
    observer.observe(document.body, { childList: true });
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
